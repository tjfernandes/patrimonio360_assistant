# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
        env:
          VITE_ENABLE_DEMO: "true"
          VITE_TOURS_BASE_URL: ${{ vars.VITE_TOURS_BASE_URL }}
          VITE_CHAT_BACKEND_BASE_URL: ${{ vars.VITE_CHAT_BACKEND_BASE_URL }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIMONIO360_AMALIA_FRONTEND }}
          channelId: live
          projectId: patrimonio360-amalia-frontend
