name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment: frontend
    steps:
      - uses: actions/checkout@v4
      - run: npm ci --prefix frontend
      - name: Validate frontend env vars
        run: |
          test -n "${VITE_TOURS_BASE_URL}" || (echo "Missing Actions variable: VITE_TOURS_BASE_URL" && exit 1)
          test -n "${VITE_CHAT_BACKEND_BASE_URL}" || (echo "Missing Actions variable: VITE_CHAT_BACKEND_BASE_URL" && exit 1)
          test -n "${VITE_ENABLE_DEMO}" || (echo "Missing Actions variable: VITE_ENABLE_DEMO" && exit 1)
          test -n "${VITE_AVAILABLE_TOUR_SLUGS}" || (echo "Missing Actions variable: VITE_AVAILABLE_TOUR_SLUGS" && exit 1)
        env:
          VITE_TOURS_BASE_URL: ${{ vars.VITE_TOURS_BASE_URL }}
          VITE_CHAT_BACKEND_BASE_URL: ${{ vars.VITE_CHAT_BACKEND_BASE_URL }}
          VITE_ENABLE_DEMO: ${{ vars.VITE_ENABLE_DEMO }}
          VITE_AVAILABLE_TOUR_SLUGS: ${{ vars.VITE_AVAILABLE_TOUR_SLUGS }}
      - run: npm run build --prefix frontend
        env:
          VITE_TOURS_BASE_URL: ${{ vars.VITE_TOURS_BASE_URL }}
          VITE_CHAT_BACKEND_BASE_URL: ${{ vars.VITE_CHAT_BACKEND_BASE_URL }}
          VITE_ENABLE_DEMO: ${{ vars.VITE_ENABLE_DEMO }}
          VITE_AVAILABLE_TOUR_SLUGS: ${{ vars.VITE_AVAILABLE_TOUR_SLUGS }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATRIMONIO360_AMALIA_FRONTEND }}
          projectId: patrimonio360-amalia-frontend
